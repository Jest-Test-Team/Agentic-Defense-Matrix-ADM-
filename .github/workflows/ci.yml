name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.25.x'
  RUST_VERSION: '1.80'

jobs:
  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          skip-cache: true

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out

  lint-rust:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --check
        working-directory: daemon_watchdog
      - name: Clippy
        run: cargo clippy -- -D warnings
        working-directory: daemon_watchdog

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test
        working-directory: daemon_watchdog

  build-analysis:
    name: Analysis Engine Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build analysis engine
        run: cargo build --release
        working-directory: analysis

  build-matrix:
    name: Build (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            goos: linux
            goarch: amd64
          - os: macos-latest
            arch: arm64
            goos: darwin
            goarch: arm64
          - os: macos-latest
            arch: amd64
            goos: darwin
            goarch: amd64
          - os: windows-latest
            arch: amd64
            goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build Go services
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          go build -ldflags="-w -s" -o bin/adm-gateway-${{ matrix.goos }}-${{ matrix.arch }} ./cmd/gateway
          go build -ldflags="-w -s" -o bin/adm-siem-${{ matrix.goos }}-${{ matrix.arch }} ./cmd/siem_engine
          go build -ldflags="-w -s" -o bin/adm-redteam-${{ matrix.goos }}-${{ matrix.arch }} ./cmd/redteam_agent
          go build -ldflags="-w -s" -o bin/adm-greenteam-${{ matrix.goos }}-${{ matrix.arch }} ./cmd/greenteam_agent
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: adm-${{ matrix.goos }}-${{ matrix.arch }}
          path: bin/

  build-watchdog:
    name: Build Watchdog (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: daemon_watchdog
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: adm-watchdog-${{ matrix.target }}
          path: daemon_watchdog/target/${{ matrix.target }}/release/adm-watchdog*

  redteam:
    name: Red Team Tests
    runs-on: ubuntu-latest
    needs: [test-go, test-rust]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run red team tests
        run: go test -v ./tests/redteam/...
