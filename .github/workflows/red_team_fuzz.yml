name: Red Team Fuzz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2am

jobs:
  corpus-scale:
    name: Corpus Scale (RT-10000)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Verify corpus expands to 10,000 variants
        run: go test -v ./pkg/redteam/...
      - name: Report corpus capacity and technique coverage
        run: |
          go run ./cmd/redteam_agent --help >/dev/null 2>&1 || true
          cat > /tmp/scale.go <<'GO'
          package main
          import ( "fmt"; "github.com/adm/pkg/redteam" )
          func main() {
            c := redteam.GenerateCorpus(10000, 1337)
            by := map[string]int{}
            for _, v := range c { by[v.Technique]++ }
            fmt.Printf("capacity=%d  requested=10000  produced=%d  techniques=%d\n",
              redteam.CorpusCapacity(), len(c), len(by))
          }
          GO
          go run /tmp/scale.go

  redteam-tests:
    name: Red Team Regression Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - attack: prompt_injection
            test: TestRT001_PromptInjection
          - attack: tool_chaining
            test: TestRT002_ToolChaining
          - attack: rag_poisoning
            test: TestRT003_RAGPoisoning
          - attack: reverse_shell
            test: TestRT004_ReverseShell
          - attack: confused_deputy
            test: TestRT005_ConfusedDeputy
          - attack: rate_abuse
            test: TestRT009_RateAbuse
          - attack: egress_exfiltration
            test: TestRT007_EgressExfiltration
          - attack: container_escape
            test: TestRT008_ContainerEscape
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Run red team test
        run: |
          go test -v -run '^${{ matrix.test }}$' ./tests/redteam/...

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-results-${{ matrix.attack }}
          path: |
            **/fuzz*.json
            **/fuzz*.log

  semantic-fuzz:
    name: Semantic Analysis Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Fuzz semantic analyzer
        run: |
          go test -v -fuzz=FuzzSemantic -fuzztime=120s ./pkg/semantic/...

  policy-fuzz:
    name: Policy Engine Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Fuzz policy evaluator
        run: |
          go test -v -fuzz=FuzzPolicyEvaluate -fuzztime=120s ./pkg/policy/...
