name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v0.0.1'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.22'
  RUST_VERSION: '1.80'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false

  build-and-package:
    name: Build & Package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
            package: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ''
            package: pkg
          - os: macos-13
            target: x86_64-apple-darwin
            ext: ''
            package: pkg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            package: msi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Go services
        env:
          GOOS: ${{ matrix.target == 'x86_64-pc-windows-msvc' && 'windows' || startsWith(matrix.target, 'aarch64-apple') && 'darwin' || startsWith(matrix.target, 'x86_64-apple') && 'darwin' || 'linux' }}
          GOARCH: amd64
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-gateway${ext} ./cmd/gateway
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-siem${ext} ./cmd/siem_engine
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-planner${ext} ./cmd/agent/planner
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-executor${ext} ./cmd/agent/executor
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-summarizer${ext} ./cmd/agent/summarizer
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-control-plane${ext} ./cmd/control_plane

      - name: Build Rust watchdog
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: daemon_watchdog

      - name: Copy watchdog binary
        run: cp daemon_watchdog/target/${{ matrix.target }}/release/adm-watchdog${{ matrix.ext }} dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums-sha256.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*
            dist/checksums-sha256.txt

  docker-images:
    name: Docker image (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: gateway,       file: deploy/Dockerfile.services, target: gateway }
          - { name: siem,          file: deploy/Dockerfile.services, target: siem }
          - { name: planner,       file: deploy/Dockerfile.services, target: planner }
          - { name: executor,      file: deploy/Dockerfile.services, target: executor }
          - { name: summarizer,    file: deploy/Dockerfile.services, target: summarizer }
          - { name: control-plane, file: deploy/Dockerfile.services, target: control-plane }
          - { name: redteam,       file: deploy/Dockerfile.battle,   target: redteam }
          - { name: greenteam,     file: deploy/Dockerfile.battle,   target: greenteam }
          - { name: analysis,      file: deploy/Dockerfile.analysis, target: '' }
          - { name: watchdog,      file: deploy/Dockerfile.rust,     target: '' }
          - { name: policy,        file: deploy/Dockerfile.opa,      target: '' }
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: ver
        run: echo "tag=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/jest-test-team/adm-${{ matrix.name }}:${{ steps.ver.outputs.tag }}
            ghcr.io/jest-test-team/adm-${{ matrix.name }}:latest
