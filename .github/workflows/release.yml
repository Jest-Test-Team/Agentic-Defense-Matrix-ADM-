name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v0.0.1'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.22'
  RUST_VERSION: '1.80'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve release tag
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${tag}" || "${tag}" != v* ]]; then
            echo "Release tag must be non-empty and start with 'v'." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ steps.ver.outputs.tag }}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists."
          else
            gh release create "${tag}" --generate-notes --target "${GITHUB_SHA}"
          fi

  build-and-package:
    name: Build & Package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: release
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            goos: linux
            goarch: amd64
            ext: ''
            package: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            goos: darwin
            goarch: arm64
            ext: ''
            package: pkg
          - os: macos-15-intel
            target: x86_64-apple-darwin
            goos: darwin
            goarch: amd64
            ext: ''
            package: pkg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            goos: windows
            goarch: amd64
            ext: .exe
            package: msi
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Go services
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-gateway${{ matrix.ext }} ./cmd/gateway
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-siem${{ matrix.ext }} ./cmd/siem_engine
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-planner${{ matrix.ext }} ./cmd/agent/planner
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-executor${{ matrix.ext }} ./cmd/agent/executor
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-summarizer${{ matrix.ext }} ./cmd/agent/summarizer
          CGO_ENABLED=0 go build -ldflags="-w -s" -o dist/adm-control-plane${{ matrix.ext }} ./cmd/control_plane

      - name: Build Rust watchdog
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: daemon_watchdog

      - name: Copy watchdog binary
        run: cp daemon_watchdog/target/${{ matrix.target }}/release/adm-watchdog${{ matrix.ext }} dist/

      - name: Generate checksums
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > checksums-sha256.txt
          else
            shasum -a 256 * > checksums-sha256.txt
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release.outputs.tag }}" dist/* --clobber

  docker-images:
    name: Docker image (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: gateway,       file: deploy/Dockerfile.services, target: gateway }
          - { name: siem,          file: deploy/Dockerfile.services, target: siem }
          - { name: planner,       file: deploy/Dockerfile.services, target: planner }
          - { name: executor,      file: deploy/Dockerfile.services, target: executor }
          - { name: summarizer,    file: deploy/Dockerfile.services, target: summarizer }
          - { name: control-plane, file: deploy/Dockerfile.services, target: control-plane }
          - { name: redteam,       file: deploy/Dockerfile.battle,   target: redteam }
          - { name: greenteam,     file: deploy/Dockerfile.battle,   target: greenteam }
          - { name: analysis,      file: deploy/Dockerfile.analysis, target: '' }
          - { name: watchdog,      file: deploy/Dockerfile.rust,     target: '' }
          - { name: policy,        file: deploy/Dockerfile.opa,      target: '' }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Resolve release tag
        id: ver
        run: echo "tag=${{ needs.release.outputs.tag }}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/jest-test-team/adm-${{ matrix.name }}:${{ steps.ver.outputs.tag }}
            ghcr.io/jest-test-team/adm-${{ matrix.name }}:latest
