name: Terraform OCI

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/terraform-oci.yml'
      - 'deploy/terraform/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/terraform-oci.yml'
      - 'deploy/terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      auto_approve:
        description: Require true before apply or destroy runs
        required: true
        default: false
        type: boolean
      existing_subnet_id:
        description: Optional OCI subnet OCID to reuse. Required for apply unless allow_create_network is true.
        required: false
        default: ''
        type: string
      allow_create_network:
        description: Allow apply to create a new OCI VCN/subnet when existing_subnet_id is empty
        required: true
        default: false
        type: boolean
      replace_instance:
        description: Force-recreate the instance so it re-runs cloud-init (needed to pick up new setup/battle scripts on the box)
        required: false
        default: false
        type: boolean
      shape:
        description: Instance shape. auto picks A1.Flex when quota allows; micro forces VM.Standard.E2.1.Micro (use when the region is out of A1 host capacity).
        required: true
        default: auto
        type: choice
        options:
          - auto
          - micro
      cleanup_axiom_volumes:
        description: Delete the orphaned axiom-* boot volumes in Door_God before applying (they block the boot volume quota)
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: terraform-oci-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_WORKING_DIR: deploy/terraform
  TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
  TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
  TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
  TF_VAR_region: ${{ secrets.OCI_REGION || 'us-ashburn-1' }}
  TF_VAR_ssh_public_key: ${{ secrets.ADM_SSH_PUBLIC_KEY }}
  TF_VAR_existing_subnet_id: ${{ inputs.existing_subnet_id || vars.ADM_EXISTING_SUBNET_ID || '' }}
  TF_VAR_force_shape: ${{ inputs.shape == 'micro' && 'micro' || '' }}
  TF_VAR_battle_database_url: ${{ secrets.ADM_BATTLE_DATABASE_URL }}
  TF_VAR_battle_elastic_url: ${{ secrets.ADM_BATTLE_ELASTIC_URL || secrets.ADM_Bonsai_Access }}
  TF_VAR_battle_ollama_model: ${{ vars.ADM_BATTLE_OLLAMA_MODEL || 'qwen2.5:0.5b' }}
  TF_VAR_groq_api_key: ${{ secrets.GROQ_API_KEY }}
  TF_VAR_battle_model: ${{ vars.ADM_BATTLE_MODEL || 'llama-3.1-8b-instant' }}
  TF_VAR_xai_api_key: ${{ secrets.XAI_API_KEY }}
  TF_VAR_xai_model: ${{ vars.ADM_XAI_MODEL || 'grok-2-latest' }}
  TF_VAR_battle_api_domain: ${{ vars.ADM_API_DOMAIN || '' }}
  TF_VAR_ocpus: ${{ vars.ADM_OCPUS || 4 }}
  TF_VAR_memory_in_gbs: ${{ vars.ADM_MEMORY_IN_GBS || 24 }}
  # Default 50 keeps the whole deploy inside the 200 GB Always Free block
  # storage cap even while orphaned boot volumes linger; raise via repo var
  # ADM_VOLUME_SIZE_GBS once the tenancy has room (resize up is in-place).
  TF_VAR_volume_size_gbs: ${{ vars.ADM_VOLUME_SIZE_GBS || 50 }}
  TF_VAR_docker_compose_version: ${{ vars.ADM_DOCKER_COMPOSE_VERSION || 'v2.29.1' }}

jobs:
  validate:
    name: Init and validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Restore Terraform state cache
        uses: actions/cache/restore@v4
        with:
          path: |
            deploy/terraform/terraform.tfstate
            deploy/terraform/terraform.tfstate.backup
          key: terraform-oci-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            terraform-oci-state-${{ github.ref_name }}-

      - name: Validate deployment inputs
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          missing=0
          for name in TF_VAR_tenancy_ocid TF_VAR_user_ocid TF_VAR_fingerprint TF_VAR_region TF_VAR_ssh_public_key OCI_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Validate manual apply intent
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
        run: |
          if [ "${{ inputs.auto_approve }}" != "true" ]; then
            echo "::error::Actual deployment requires auto_approve=true."
            exit 1
          fi

          if [ -z "$TF_VAR_existing_subnet_id" ] && [ "${{ inputs.allow_create_network }}" != "true" ]; then
            echo "::error::Apply may create a new OCI VCN/subnet, but existing_subnet_id is empty and allow_create_network=false."
            echo "::error::Re-run with existing_subnet_id set to an existing subnet OCID, or set allow_create_network=true. Terraform reuses an existing adm-vcn/adm-subnet if one is found, and only creates a new VCN otherwise."
            exit 1
          fi

          if [ -n "$TF_VAR_existing_subnet_id" ]; then
            echo "Applying into existing subnet: ${TF_VAR_existing_subnet_id:0:24}..."
          else
            echo "::warning::Applying with allow_create_network=true. Terraform reuses an existing adm-vcn/adm-subnet if found; otherwise it creates a new VCN, which fails if the tenancy vcn-count quota is exhausted."
          fi

      - name: Write OCI API private key
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          umask 077
          printf '%s' "$OCI_PRIVATE_KEY" > "$RUNNER_TEMP/oci_api_key.pem"
          chmod 600 "$RUNNER_TEMP/oci_api_key.pem"
          echo "TF_VAR_private_key_path=$RUNNER_TEMP/oci_api_key.pem" >> "$GITHUB_ENV"

      - name: Delete orphaned axiom boot volumes
        if: github.event_name == 'workflow_dispatch' && inputs.cleanup_axiom_volumes
        env:
          OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_CLI_REGION: ${{ secrets.OCI_REGION || 'us-ashburn-1' }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: 'True'
        run: |
          pip install --quiet oci-cli
          export OCI_CLI_KEY_FILE="$RUNNER_TEMP/oci_api_key.pem"
          COMP_ID=$(oci iam compartment list --compartment-id "$OCI_CLI_TENANCY" --compartment-id-in-subtree true --all | jq -r '.data[] | select(.name=="Door_God") | .id' | head -1)
          if [ -z "$COMP_ID" ]; then
            echo "Door_God compartment not found; nothing to clean up."
            exit 0
          fi
          AD=$(oci iam availability-domain list --compartment-id "$OCI_CLI_TENANCY" | jq -r '.data[0].name')
          IDS=$(oci bv boot-volume list --compartment-id "$COMP_ID" --availability-domain "$AD" --all | jq -r '.data[] | select(."lifecycle-state"=="AVAILABLE") | select(."display-name" | startswith("axiom")) | .id')
          if [ -z "$IDS" ]; then
            echo "No orphaned axiom boot volumes found."
            exit 0
          fi
          for id in $IDS; do
            echo "Deleting orphaned axiom boot volume ...${id: -12}"
            oci bv boot-volume delete --boot-volume-id "$id" --force
          done

      - name: Terraform init
        run: terraform init

      - name: Skip network discovery when state manages the VCN
        run: |
          if terraform state list 2>/dev/null | grep -Fq 'oci_core_vcn.adm_vcn'; then
            echo "TF_VAR_reuse_discovered_network=false" >> "$GITHUB_ENV"
            echo "State already manages adm-vcn; disabling auto-discovery so Terraform keeps managing it."
          fi

      - name: Terraform plan
        if: github.event_name == 'push' || inputs.action == 'plan' || inputs.action == 'apply'
        run: terraform plan ${{ inputs.replace_instance && '-replace=oci_core_instance.adm_instance' || '' }} -out=tfplan

      - name: Terraform destroy plan
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        run: terraform plan -destroy -out=tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-oci-plan-${{ github.run_id }}
          path: deploy/terraform/tfplan
          retention-days: 7

      - name: Terraform apply
        id: apply
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && inputs.auto_approve
        continue-on-error: true
        run: terraform apply -auto-approve tfplan

      - name: Retry apply with micro shape after A1 failure
        id: apply_retry
        if: steps.apply.outcome == 'failure' && inputs.shape != 'micro'
        env:
          TF_VAR_force_shape: micro
        run: |
          echo "::warning::Apply failed (likely A1 out of host capacity); retrying with VM.Standard.E2.1.Micro."
          terraform plan ${{ inputs.replace_instance && '-replace=oci_core_instance.adm_instance' || '' }} -out=tfplan
          terraform apply -auto-approve tfplan

      - name: Fail when apply did not succeed
        if: steps.apply.outcome == 'failure' && steps.apply_retry.outcome != 'success'
        run: |
          echo "::error::Terraform apply failed and the micro-shape retry did not succeed."
          exit 1

      - name: Terraform destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' && inputs.auto_approve
        run: terraform apply -auto-approve tfplan

      - name: Terraform output
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply' && inputs.auto_approve
        run: terraform output

      - name: Deployment summary
        if: always() && github.event_name == 'workflow_dispatch'
        run: |
          {
            echo "## Terraform OCI"
            echo
            echo "- Init and validate checks Terraform syntax/provider schema."
            echo "- Plan previews what Terraform would create/change."
            echo "- Actual deployment only happens for manual runs with action=apply and auto_approve=true."
            echo "- To avoid OCI vcn-count failures, provide existing_subnet_id or set repo variable ADM_EXISTING_SUBNET_ID."
            echo "- The plan log's network_diagnostics output shows vcn-count quota usage and all VCNs/subnets in the compartment."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save Terraform state cache
        if: always() && github.event_name == 'workflow_dispatch' && inputs.auto_approve
        uses: actions/cache/save@v4
        with:
          path: |
            deploy/terraform/terraform.tfstate
            deploy/terraform/terraform.tfstate.backup
          key: terraform-oci-state-${{ github.ref_name }}-${{ github.run_id }}
