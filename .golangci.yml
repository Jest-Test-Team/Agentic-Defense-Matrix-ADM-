linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - bodyclose
    - contextcheck
    - dupl
    - errname
    - errorlint
    - exhaustive
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gosec
    - nakedret
    - nestif
    - prealloc
    - predeclared
    - revive
    - unparam
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  goconst:
    min-len: 3
    min-occurrences: 3
  funlen:
    lines: 100
    statements: 60
  gocyclo:
    min-complexity: 15
  gosec:
    excludes:
      - G104
  nakedret:
    max-func-lines: 30

run:
  timeout: 5m
  tests: true
  build-tags: []

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - funlen
        - gosec
        - dupl
    - path: pkg/proto/
      linters:
        - unused
        - unparam
