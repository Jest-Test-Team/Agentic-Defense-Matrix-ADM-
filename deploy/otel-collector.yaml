receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
    send_batch_max_size: 2048

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  resource:
    attributes:
      - key: deployment.environment
        value: "local"
        action: upsert
      - key: service.namespace
        value: "adm"
        action: upsert

exporters:
  logging:
    verbosity: normal

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: adm

  # Uncomment and configure for external backend
  # otlp/grafana:
  #   endpoint: tempo:4317
  #   tls:
  #     insecure: true

  # otlp/external:
  #   endpoint: your-otel-backend:4317
  #   headers:
  #     x-api-key: ${OTEL_API_KEY}

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [logging, prometheus]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [logging, prometheus]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
