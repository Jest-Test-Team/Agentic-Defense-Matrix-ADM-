#cloud-config
# ADM Oracle Cloud Always Free - Cloud Init (Oracle Linux 8).
# All provisioning lives in /opt/adm/provision.sh (a write_files block scalar)
# rather than inline runcmd, because complex shell in runcmd list items trips
# YAML mapping parsing (a ": " turns the item into a dict and aborts runcmd).

users:
  # '- default' preserves the OL8 'opc' user and its metadata ssh key injection
  # (ADM_SSH_PUBLIC_KEY). Without it cloud-init drops opc and no one can SSH in.
  - default
  - name: adm
    shell: /bin/bash
    home: /home/adm
    groups: docker
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_public_key}

write_files:
  - path: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "storage-driver": "overlay2",
        "dns": ["8.8.8.8", "1.1.1.1"]
      }

  - path: /etc/sysctl.d/99-adm.conf
    content: |
      net.core.somaxconn = 65535
      net.ipv4.ip_local_port_range = 1024 65535
      vm.swappiness = 10
      fs.file-max = 2097152

  - path: /etc/security/limits.d/adm.conf
    content: |
      adm soft nofile 65535
      adm hard nofile 65535

  # Battle-exercise config. Populated from Terraform variables; when
  # battle_database_url is empty the overlay is skipped (base stack only).
  - path: /opt/adm/battle.env
    owner: adm:adm
    permissions: "0600"
    content: |
      # Values are single-quoted: connection strings contain '&' (e.g. Neon's
      # ?sslmode=require&channel_binding=require) which would otherwise background
      # the assignment when the file is sourced, leaving the var unset.
      DATABASE_URL='${battle_database_url}'
      ELASTIC_URL='${battle_elastic_url}'
      ADM_OLLAMA_MODEL='${battle_ollama_model}'
      ADM_LLM_MODE='${battle_llm_mode}'
      ADM_LLM_BASE_URL='https://api.groq.com/openai/v1'
      ADM_LLM_API_KEY='${groq_api_key}'
      ADM_MODEL='${battle_model}'
      ADM_ATTACK_INTERVAL_MS='2500'
      ADM_ATTACK_CONCURRENCY='1'

  # Full provisioning script. A block scalar can contain colons, quotes and awk
  # freely, so none of the YAML-in-runcmd escaping hazards apply here.
  - path: /opt/adm/provision.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      mkdir -p /opt/adm/logs
      exec >> /opt/adm/logs/provision.log 2>&1
      set -x
      echo "=== provision start $(date) ==="

      # MTU: OCI VNICs default to jumbo frames (9000) but the internet path is
      # 1500, so large TLS downloads (dnf packages, images) stall. Force 1500 and
      # persist it on the active NetworkManager connection.
      IFACE=$(ip -o -4 route show to default | awk '{print $5}' | head -1)
      CON=$(nmcli -t -f NAME,DEVICE con show --active | awk -F: -v i="$IFACE" '$2==i{print $1}' | head -1)
      if [ -n "$CON" ]; then
        nmcli con mod "$CON" 802-3-ethernet.mtu 1500 || true
        nmcli dev disconnect "$IFACE" || true
        nmcli con up "$CON" || true
      fi
      ip link set dev "$IFACE" mtu 1500 || true
      echo "MTU now: $(ip link show "$IFACE" | grep -o 'mtu [0-9]*')"

      # Swap: headroom for image pulls/startup on the 1 GB micro.
      if [ ! -f /swapfile ]; then
        dd if=/dev/zero of=/swapfile bs=1M count=4096
        chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile
        echo "/swapfile none swap sw 0 0" >> /etc/fstab
      fi
      sysctl --system || true

      # Base tools (OL8): no curl (conflicts with curl-minimal); jq via EPEL.
      dnf install -y dnf-plugins-core || dnf install -y dnf-utils || true
      dnf install -y git || true
      dnf install -y oracle-epel-release-el8 || dnf install -y epel-release || true
      dnf install -y jq || true

      # Docker CE (OL8). --allowerasing resolves the containerd.io vs preinstalled
      # runc/podman conflict.
      dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo || true
      dnf install -y --allowerasing docker-ce docker-ce-cli containerd.io docker-compose-plugin
      systemctl enable --now docker
      usermod -aG docker adm
      docker --version

      # Disable host firewalld: OCI's NSG (adm-nsg) already restricts ingress to
      # the ADM ports at the network layer, and firewalld's dbus can hang with
      # NoReply on this minimal image and stall provisioning indefinitely.
      systemctl disable --now firewalld >/dev/null 2>&1 || true

      # 'adm' is a reserved OL8 system account (uid 3, /sbin/nologin), so the
      # cloud-init users: block can't make it a usable login. Force a bash shell,
      # a real home, and docker-group membership so `su - adm` works.
      usermod -s /bin/bash -d /home/adm adm
      mkdir -p /home/adm && chown adm:adm /home/adm
      usermod -aG docker adm

      # Clone, set up, and launch.
      chown -R adm:adm /opt/adm
      [ -d /opt/adm/repo ] || su - adm -c "git clone https://github.com/Jest-Test-Team/Agentic-Defense-Matrix-ADM-.git /opt/adm/repo"
      su - adm -c "chmod +x /opt/adm/repo/deploy/scripts/*.sh"
      su - adm -c "/opt/adm/repo/deploy/scripts/setup.sh >> /opt/adm/logs/setup.log 2>&1" || true
      if grep -Eq '^DATABASE_URL=.+' /opt/adm/battle.env; then
        su - adm -c "/opt/adm/repo/deploy/scripts/battle-up.sh >> /opt/adm/logs/battle.log 2>&1"
      else
        echo "no DATABASE_URL - overlay skipped"
      fi
      echo "=== provision done $(date) ==="

runcmd:
  - mkdir -p /opt/adm/logs
  - bash /opt/adm/provision.sh
