#cloud-config
# ADM Oracle Cloud Always Free - Cloud Init
# Runs on first boot to set up Docker, Docker Compose, and ADM stack

package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose-plugin
  - git
  - curl
  - jq
  - htop
  - tmux

users:
  - name: adm
    shell: /bin/bash
    home: /home/adm
    groups: docker
    sudo: ALL=(ALL) NOPASSWD:ALL

write_files:
  - path: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "storage-driver": "overlay2",
        "dns": ["8.8.8.8", "1.1.1.1"]
      }

  - path: /etc/sysctl.d/99-adm.conf
    content: |
      net.core.somaxconn = 65535
      net.ipv4.ip_local_port_range = 1024 65535
      vm.swappiness = 10
      fs.file-max = 2097152

  - path: /etc/security/limits.d/adm.conf
    content: |
      adm soft nofile 65535
      adm hard nofile 65535

  # Battle-exercise config. Populated from Terraform variables; when
  # battle_database_url is empty the overlay is skipped (base stack only).
  - path: /opt/adm/battle.env
    owner: adm:adm
    permissions: "0600"
    content: |
      DATABASE_URL=${battle_database_url}
      ELASTIC_URL=${battle_elastic_url}
      ADM_OLLAMA_MODEL=${battle_ollama_model}

runcmd:
  - sysctl --system
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker adm
  - mkdir -p /opt/adm
  - chown -R adm:adm /opt/adm
  - su - adm -c "git clone https://github.com/Jest-Test-Team/Agentic-Defense-Matrix-ADM-.git /opt/adm/repo"
  - su - adm -c "chmod +x /opt/adm/repo/deploy/scripts/*.sh"
  - su - adm -c "/opt/adm/repo/deploy/scripts/setup.sh"
  # Launch the red/blue/green battle overlay only when a Neon DATABASE_URL was
  # provided; otherwise leave the base stack running and skip the exercise.
  - su - adm -c "grep -Eq '^DATABASE_URL=.+' /opt/adm/battle.env && /opt/adm/repo/deploy/scripts/battle-up.sh >> /opt/adm/logs/battle.log 2>&1 || echo 'battle: no DATABASE_URL, overlay skipped'"
