#cloud-config
# ADM Oracle Cloud Always Free - Cloud Init
# Runs on first boot to set up Docker, Docker Compose, and the ADM stack.
# Target image: Oracle Linux 8 (dnf-based) — NOT Ubuntu, so Docker is installed
# from the docker-ce repo rather than the (nonexistent) docker.io package.

package_update: true

# Only packages that exist in the OL8 base/appstream repos. Docker CE is added
# via its own repo in runcmd below.
packages:
  - git
  - curl
  - jq

users:
  # '- default' preserves the OL8 'opc' user and its metadata ssh key injection
  # (ADM_SSH_PUBLIC_KEY). Without it cloud-init drops opc and no one can SSH in.
  - default
  - name: adm
    shell: /bin/bash
    home: /home/adm
    groups: docker
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ${ssh_public_key}

write_files:
  - path: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "storage-driver": "overlay2",
        "dns": ["8.8.8.8", "1.1.1.1"]
      }

  - path: /etc/sysctl.d/99-adm.conf
    content: |
      net.core.somaxconn = 65535
      net.ipv4.ip_local_port_range = 1024 65535
      vm.swappiness = 10
      fs.file-max = 2097152

  - path: /etc/security/limits.d/adm.conf
    content: |
      adm soft nofile 65535
      adm hard nofile 65535

  # Battle-exercise config. Populated from Terraform variables; when
  # battle_database_url is empty the overlay is skipped (base stack only).
  - path: /opt/adm/battle.env
    owner: adm:adm
    permissions: "0600"
    content: |
      DATABASE_URL=${battle_database_url}
      ELASTIC_URL=${battle_elastic_url}
      ADM_OLLAMA_MODEL=${battle_ollama_model}
      # LLM backend. When a Groq key is provided, battle_llm_mode is "openai" and
      # the on-box Ollama container is skipped so the stack fits the 1 GB micro.
      ADM_LLM_MODE=${battle_llm_mode}
      ADM_LLM_BASE_URL=https://api.groq.com/openai/v1
      ADM_LLM_API_KEY=${groq_api_key}
      ADM_MODEL=${battle_model}
      # Throttle the red team to stay within Groq's free rate limit (~30 req/min).
      ADM_ATTACK_INTERVAL_MS=2500
      ADM_ATTACK_CONCURRENCY=1

runcmd:
  # --- Swap: the 1 GB micro OOM-kills Go/Rust image builds without it. ---
  - bash -c 'if [ ! -f /swapfile ]; then dd if=/dev/zero of=/swapfile bs=1M count=4096 && chmod 600 /swapfile && mkswap /swapfile && swapon /swapfile && echo "/swapfile none swap sw 0 0" >> /etc/fstab; fi'
  - sysctl --system

  # --- Docker CE on Oracle Linux 8 (from the docker-ce repo). ---
  - dnf install -y dnf-utils
  - dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  - dnf install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - usermod -aG docker adm

  # --- Open the host firewall for the ADM ports (OL8 ships firewalld). ---
  - bash -c 'if systemctl is-active --quiet firewalld; then for p in 8080 8090 11434; do firewall-cmd --permanent --add-port=$p/tcp; done; firewall-cmd --reload; fi'

  # --- Clone and set up the stack. ---
  - mkdir -p /opt/adm/logs
  - chown -R adm:adm /opt/adm
  - su - adm -c "git clone https://github.com/Jest-Test-Team/Agentic-Defense-Matrix-ADM-.git /opt/adm/repo"
  - su - adm -c "chmod +x /opt/adm/repo/deploy/scripts/*.sh"
  - su - adm -c "/opt/adm/repo/deploy/scripts/setup.sh >> /opt/adm/logs/setup.log 2>&1"

  # --- Launch the red/blue/green battle overlay only when a Neon DATABASE_URL
  #     was provided; otherwise leave the base stack running. ---
  - su - adm -c "grep -Eq '^DATABASE_URL=.+' /opt/adm/battle.env && /opt/adm/repo/deploy/scripts/battle-up.sh >> /opt/adm/logs/battle.log 2>&1 || echo 'battle: no DATABASE_URL, overlay skipped'"
