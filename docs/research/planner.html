      q: { zh: "OS 級遙測（WFP/ES）在生產環境太重？", en: "OS-level telemetry (WFP/ES) is too heavy for production?" },
      a: { zh: "Pareto/開銷研究正為此而建：無鎖環形緩衝區 + Redis Streams 在極端事件併發下維持穩態 CPU/記憶體 ≤5%，同時保持微秒—毫秒級圍堵延遲 κ；附無鎖 vs 互斥佇列消融與開銷—事件率曲線。", en: "The Pareto/overhead study is built for this: lock-free ring buffer + Redis Streams hold steady-state CPU/mem ≤5% under extreme concurrency while sustaining micro-to-milli-second containment latency κ; with a lock-free-vs-mutex ablation and overhead-vs-event-rate curve." }
    }
  }
];

const THREATS = [
  { id:"indirect", mod:["c1"], atlas:"AML.T0051 · OWASP-LLM01",
    name:{zh:"間接提示詞注入", en:"Indirect prompt injection"},
    hook:{zh:"注入藏於 RAG／工具輸出中，單一訊息看似無害——正是逐訊息守衛的盲區。", en:"injection hidden in RAG/tool output; each message looks benign — the blind spot of per-message guards."} },
  { id:"camouflage", mod:["c1"], atlas:"AML.T0051 · multi-turn",
    name:{zh:"多步偽裝攻擊", en:"Multi-step camouflage"},
    hook:{zh:"每一步都低於單訊息閾值 τ，但聚合漂移 D_n(W) 超過 θ——證明窗口統計量價值的關鍵案例。", en:"every step below the single-message bar τ, yet aggregate drift D_n(W) exceeds θ — the case that proves the windowed statistic's worth."} },
  { id:"toolabuse", mod:["c1","c2"], atlas:"OWASP-LLM08",
    name:{zh:"工具濫用 / 混淆代理", en:"Tool abuse / confused deputy"},
    hook:{zh:"合法工具被誘導鏈式呼叫（read_secret → external_send），跨越授權流形邊界。", en:"legitimate tools coerced into chains (read_secret → external_send) crossing the authorization boundary."} },
  { id:"exfil", mod:["c2","c1"], atlas:"AML.T0054",
    name:{zh:"敏感憑證外洩", en:"Credential exfiltration"},
    hook:{zh:"外洩量以夏農熵計——直接進入爆炸半徑 B(Δ) 的 H_exf 項。", en:"exfiltration measured in Shannon entropy — feeding the H_exf term of blast radius B(Δ)."} },
  { id:"revshell", mod:["c2"], atlas:"AML.T0052",
    name:{zh:"反向 Shell / 容器逃逸", en:"Reverse shell / container escape"},
    hook:{zh:"OS 級 edge（非授權 socket/process）——只有 WFP/ES 遙測能截斷的可達邊。", en:"OS-level edges (unauthorized sockets/processes) — reachable only cut by WFP/ES telemetry."} },
  { id:"dos", mod:["c2","c1"], atlas:"OWASP-LLM04",
    name:{zh:"資源耗盡 / DoS", en:"Resource exhaustion / DoS"},
    hook:{zh:"自動化高頻探測——非對稱定律 α=o(1) 在此最吃緊：防禦每 token 成本必須遠低於攻擊。", en:"automated high-frequency probing — where the asymmetry law α=o(1) bites hardest: per-token defense cost must be far below attack cost."} },
];

const METRICS = [
  { id:"latency", mod:["c1"],
    name:{zh:"偵測延遲（Mitigation Delay）", en:"Detection latency (mitigation delay)"},
    figure:{zh:"Mitigation-delay CDF：ADM 較 Llama Guard 左移數個數量級（p50/p95/p99）。", en:"Mitigation-delay CDF: ADM orders-of-magnitude left of Llama Guard (p50/p95/p99)."},
    focus:{zh:"以非對稱比 α=cost_defense/cost_attack 為核心：ADM 每 token O(1) 攤還 vs Llama Guard 每訊息 Θ(L·d_model)。", en:"Center the asymmetry ratio α=cost_defense/cost_attack: ADM O(1) amortized per token vs Llama Guard Θ(L·d_model) per message."} },
  { id:"throughput", mod:["c1"],
    name:{zh:"吞吐量 / Token 成本", en:"Throughput / token cost"},
    figure:{zh:"固定 SLA 下的吞吐量與 $/1k-req 條形圖：ADM vs 逐訊息 LLM 守衛。", en:"Throughput at fixed SLA and $/1k-req bar chart: ADM vs per-message LLM guard."},
    focus:{zh:"論證自動化對手下唯有 α=o(1) 的防禦可行；否則吞吐先崩潰。", en:"Argue only α=o(1) defenses are viable under automated adversaries; else throughput collapses first."} },
  { id:"bounds", mod:["c1"],
    name:{zh:"FP/FN 理論上下界", en:"FP/FN theoretical bounds"},
    figure:{zh:"窗口掃描圖：實測 FPR/FNR 疊加 Eq.2/3 的指數衰減預測——理論與實驗吻合的可信度錨點。", en:"Window-sweep: measured FPR/FNR overlaid on the Eq. 2/3 exponential-decay prediction — the credibility anchor."},
    focus:{zh:"推導 FPR≤exp(−W(θ−μ_b)²/2σ²)、FNR≤exp(−W(μ_a−θ)²/2σ²)，並以 Le Cam 兩點法給出可偵測性資訊下界。", en:"Derive FPR≤exp(−W(θ−μ_b)²/2σ²), FNR≤exp(−W(μ_a−θ)²/2σ²), and a Le-Cam two-point information lower bound on detectability."} },
  { id:"containment", mod:["c2"],
    name:{zh:"圍堵延遲 κ", en:"Containment latency κ"},
    figure:{zh:"端到端 δ、κ 分佈（事件→告警→OPA 撤銷→watchdog 殺）：報分佈而非只報 MTTR。", en:"End-to-end δ, κ distributions (event→alert→OPA flip→watchdog kill): report distributions, not just MTTR."},
    focus:{zh:"由 Eq.3，B(∞) 線性於 (δ+κ) 且與時界 Δ 無關；縮短 κ 即縮小殘餘損害。", en:"By Eq. 3, B(∞) is linear in (δ+κ) and independent of horizon Δ; shrinking κ shrinks residual damage."} },
  { id:"overhead", mod:["c2"],
    name:{zh:"系統開銷（CPU/記憶體）", en:"System overhead (CPU/memory)"},
    figure:{zh:"Pareto 前沿（安全↔開銷）+ 開銷—事件率曲線，守住 ≤5% 線；無鎖 vs 互斥消融。", en:"Pareto frontier (security↔overhead) + overhead-vs-event-rate holding the ≤5% line; lock-free vs mutex ablation."},
    focus:{zh:"審稿人必質疑 OS 遙測負載——用 Pareto 圖證明 ADM 支配 naive 基線。", en:"Reviewers will challenge OS-telemetry load — use the Pareto plot to show ADM dominates naive baselines."} },
  { id:"blast", mod:["c2"],
    name:{zh:"爆炸半徑 B(Δ)", en:"Blast radius B(Δ)"},
    figure:{zh:"各 ATLAS 類別的爆炸半徑條形圖：ADM vs log-only vs kill-on-anomaly——頭條指標。", en:"Blast-radius bar chart per ATLAS class: ADM vs log-only vs kill-on-anomaly — the headline metric."},
    focus:{zh:"提出熵加權可達集作為新的 Agent 威脅度量，並以圍堵定理給出 B 的閉式上界。", en:"Propose entropy-weighted reachable set as a new agent-threat metric, with the containment theorem giving a closed-form upper bound on B."} },
];

let state = { lang: "zh", module: "c1", threat: "camouflage", metric: "bounds" };

const $ = s => document.querySelector(s);
function tr(o){ return o[state.lang]; }

function setAccent(mod){
  const a = mod.accent === "teal" ? "var(--teal)" : "var(--claret)";
  const s = mod.accent === "teal" ? "var(--teal-soft)" : "var(--claret-soft)";
  document.documentElement.style.setProperty("--accent", a);
  document.documentElement.style.setProperty("--accent-soft", s);
}

function renderControls(){
  const t = L[state.lang];
  $("#lbl-module").textContent = t.module;
  $("#lbl-threat").textContent = t.threat;
  $("#lbl-metric").textContent = t.metric;

  $("#modules").innerHTML = MODULES.map(m =>
    `<button class="opt ${state.module===m.id?"on":""}" data-k="module" data-v="${m.id}">
       <span class="oname">${tr(m.name)}</span><span class="odesc">${tr(m.desc)}</span></button>`).join("");

  $("#threats").innerHTML = THREATS.map(x => {
    const primary = x.mod[0]===state.module, applies = x.mod.includes(state.module);
    return `<button class="opt ${state.threat===x.id?"on":""} ${applies?"":"dim"}" data-k="threat" data-v="${x.id}" ${applies?"":"disabled"}>
       <span class="oname">${tr(x.name)}</span><span class="odesc">${x.atlas}${primary?"":applies?" · 次要":""}</span></button>`;
  }).join("");

  $("#metrics").innerHTML = METRICS.map(x => {
    const applies = x.mod.includes(state.module);
    return `<button class="opt ${state.metric===x.id?"on":""} ${applies?"":"dim"}" data-k="metric" data-v="${x.id}" ${applies?"":"disabled"}>
       <span class="oname">${tr(x.name)}</span></button>`;
  }).join("");
}

function renderBrief(){
  const t = L[state.lang];
  const m = MODULES.find(x=>x.id===state.module);
  const th = THREATS.find(x=>x.id===state.threat);
  const me = METRICS.find(x=>x.id===state.metric);
  setAccent(m);

  const title = m.titleTpl[state.lang](tr(th.name));
  const venue = tr(m.venue).map(v=>`<span class="chip accent">${v}</span>`).join("");

  const el = $("#brief");
  el.innerHTML = `
    <div class="brief-head">
      <div class="venue-row">
        <span class="chip">${tr(m.name)}</span>
        <span class="chip atlas">${t.atlas}: ${th.atlas}</span>
      </div>
      <h2 class="brief-title">${title}</h2>
    </div>
    <div class="brief-body">
      <section class="blk">
        <p class="blk-h"><span class="num">1</span>${t.secThesis}</p>
        <p>${tr(m.thesis)}</p>
        <div class="callout"><span class="mk">“</span><p>${tr(th.hook)}</p></div>
      </section>

      <section class="blk">
        <p class="blk-h"><span class="num">2</span>${t.secForm}</p>
        ${tr(m.form).map(p=>`<p>${p}</p>`).join("")}
        <div class="math">${m.form.math.replace(/«/g,'<span class="cmt">«').replace(/»/g,'»</span>')}</div>
        <p><b>${state.lang==="zh"?"針對本指標的形式化重點":"Formalization focus for this metric"}:</b> ${tr(me.focus)}</p>
      </section>

      <section class="blk">
        <p class="blk-h"><span class="num">3</span>${t.secBase}</p>
        <ul>${tr(m.baselines).map(b=>`<li>${b}</li>`).join("")}</ul>
        <p style="margin-top:12px"><b>${state.lang==="zh"?"關鍵圖表":"Key figure"} — ${tr(me.name)}:</b> ${tr(me.figure)}</p>
      </section>

      <section class="blk">
        <p class="blk-h"><span class="num">4</span>${t.secDefense}</p>
        <div class="defense">
          <div class="row"><p class="q">${tr(m.reviewer.q)}</p><p class="a">${tr(m.reviewer.a)}</p></div>
        </div>
      </section>

      <section class="blk">
        <p class="blk-h"><span class="num">5</span>${t.secVenue}</p>
        <div class="venue-row">${venue}</div>
      </section>
    </div>`;
  el.classList.remove("fade"); void el.offsetWidth; el.classList.add("fade");
}

function renderStatic(){
  const t = L[state.lang];
  $("#eyebrow").textContent = t.eyebrow;
  $("#mtitle").innerHTML = t.title;
  $("#msub").textContent = t.sub;
  $("#lede").innerHTML = t.lede;
  $("#footnote").innerHTML = t.foot;
  document.querySelectorAll("#langseg button").forEach(b=>b.classList.toggle("on", b.dataset.lang===state.lang));
}

function renderAll(){ renderStatic(); renderControls(); renderBrief(); }

document.addEventListener("click", e => {
  const opt = e.target.closest(".opt[data-k]");
  if (opt && !opt.disabled){
    state[opt.dataset.k] = opt.dataset.v;
    // if switching module, snap threat/metric to a valid one for that module
    if (opt.dataset.k === "module"){
      const m = state.module;
      if (!THREATS.find(x=>x.id===state.threat)?.mod.includes(m))
        state.threat = THREATS.find(x=>x.mod[0]===m).id;
      if (!METRICS.find(x=>x.id===state.metric)?.mod.includes(m))
        state.metric = METRICS.find(x=>x.mod.includes(m)).id;
    }
    renderAll();
  }
  const lang = e.target.closest("#langseg button");
  if (lang){ state.lang = lang.dataset.lang; renderAll(); }
});

$("#themebtn").addEventListener("click", () => {
  const root = document.documentElement;
  const cur = root.getAttribute("data-theme")
    || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  root.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
});

renderAll();
</script>
